spring.application.name=AIS
spring.config.import=optional:file:.env[.properties]
# DART API 설정
api.dart.base-url=https://opendart.fss.or.kr/api
api.dart.key=${API_DART_KEY:}

# Naver API 설정 (향후 뉴스 수집 확장용)
api.naver.news-url=https://openapi.naver.com/v1/search/news.json
api.naver.client-id=${API_NAVER_CLIENT_ID:}
api.naver.client-secret=${API_NAVER_CLIENT_SECRET:}

# 뉴스 수집 건수 (튜토리얼 LLM 입력 — 종목 키워드 vs 시장 키워드 별도)
app.news.naver.stock-display-count=5
app.news.google.stock-display-count=5
app.news.naver.market-display-count=3
app.news.google.market-display-count=3

# OpenAI API 설정
openai.api-url=https://api.openai.com/v1/chat/completions
openai.api-key=${OPENAI_API_KEY:}

# 튜토리얼 JSON(evidence) 및 MTS 시연 UI에 노출할 데이터 출처 표기
app.tutorial-ui.market-data-provider-label=한국투자증권
app.tutorial-ui.research-provider-label=한화 WM

# 한국투자증권 API 설정 (실전투자 기준 URL)
api.kis.base-url=https://openapi.koreainvestment.com:9443
api.kis.app-key=${API_KIS_APP_KEY:}
api.kis.app-secret=${API_KIS_APP_SECRET:}

# 공공데이터포털 한국예탁결제원 주식정보서비스 설정
api.data-go-kr.base-url=https://api.seibro.or.kr/openapi/service/StockSvc?_wadl&type=xml
api.data-go-kr.service-key=${API_DATA_GO_KR_SERVICE_KEY:}

# AI 튜토리얼: 종목별 파일 캐시 (동일 종목 재요청 시 외부 API·OpenAI 부하 완화)
app.tutorial-cache.directory=cache/tutorial
app.tutorial-cache.ttl-minutes=10

# 시장 키워드 뉴스(코스피/코스닥 등): 시장 단위 파일 캐시 — 모든 종목이 TTL 내 동일 스냅샷 공유
app.market-news-cache.directory=cache/market-news
app.market-news-cache.ttl-minutes=30
app.market-news-cache.enabled=true

# DART Open API: KST 일자별 디렉터리에 JSON·ZIP 캐시 (동일 일 재요청 시 DART 부하 완화)
app.dart-cache.directory=cache/dart/daily
app.dart-cache.enabled=true

# 한화투자증권 WM 기업·산업분석 목록(1페이지) 스크래핑 + KST 일 단위 파일 캐시
app.hanwha-research.enabled=true
app.hanwha-research.cache-enabled=true
app.hanwha-research.cache-directory=cache/hanwha-research
app.hanwha-research.list-url=https://www.hanwhawm.com/main/research/main/list.cmd?depth2_id=1002&mode=depth2
app.hanwha-research.site-base=https://www.hanwhawm.com
app.hanwha-research.connect-timeout-ms=20000

server.port=${PORT:8081}
# 모든 외부 접속 IP를 허용한다
server.address=0.0.0.0